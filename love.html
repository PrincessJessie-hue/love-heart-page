<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Love Heart</title>

<style>
body{
  margin:0;
  background:black;
  overflow:hidden;
  font-family:Arial;
}

canvas{
  display:block;
}

#name{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  color:pink;
  font-size:60px;
  opacity:0;
  transition:opacity 0.6s;
  text-shadow:0 0 20px pink;
  pointer-events:none;
}
</style>

</head>

<body>

<canvas id="c"></canvas>
<div id="name">Ntsika Zulu 💗</div>

<!-- Background Music -->
<audio id="bg-music" autoplay loop>
  <source src="mp3/Jhené Aiko - While We're Young (Official Video).mp3" type="audio/mpeg">
  Your browser does not support the audio element.
</audio>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let offset = 0;
let names = [];

function heart(t){
  let x = 16*Math.pow(Math.sin(t),3);
  let y = 13*Math.cos(t)-5*Math.cos(2*t)-2*Math.cos(3*t)-Math.cos(4*t);
  return {x:x*20,y:-y*20};
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  
  ctx.save();
  ctx.translate(canvas.width/2,canvas.height/2);
  
  ctx.fillStyle="pink";
  ctx.font="10px Arial";
  
  for(let i=0;i<200;i++){
    let t = (i*0.05 + offset) % (Math.PI*2);
    let p = heart(t);
    ctx.fillText("I like you",p.x,p.y);
  }
  
  ctx.restore();
  
  offset += 0.004;
  
  // Draw clicked names
  names.forEach((n,i)=>{
    ctx.globalAlpha = n.opacity;
    ctx.fillStyle = "hotpink";
    ctx.font = "28px Arial";
    ctx.fillText("Ntsika Zulu 💗", n.x, n.y);
    n.opacity -= 0.01;
  });
  
  names = names.filter(n => n.opacity > 0);
  
  ctx.globalAlpha = 1;
  
  requestAnimationFrame(draw);
}

draw();

// Click interaction
document.addEventListener("click",(e)=>{
  names.push({
    x:e.clientX,
    y:e.clientY,
    opacity:1
  });

  // Optional: start music on first click for browsers that block autoplay
  const music = document.getElementById("bg-music");
  if(music.paused) music.play();
});
</script>

</body>
</html>
